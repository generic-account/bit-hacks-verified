name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Restore incremental CI state
        uses: actions/cache@v4
        with:
          path: build/ci-state
          key: ci-state-${{ runner.os }}-${{ github.ref_name }}-${{ hashFiles('Makefile', 'README.md', 'src/include/bh/harness.h', 'src/scripts/gen_site.py', 'src/hacks/*.c') }}
          restore-keys: |
            ci-state-${{ runner.os }}-${{ github.ref_name }}-
            ci-state-${{ runner.os }}-

      - name: Install Clang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Run CI pipeline
        run: make ci

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          working-directory: site
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build --source . --destination ../build/site
        working-directory: site

      - name: Upload fuzz artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts
          path: build/fuzz-artifacts
          if-no-files-found: warn

      - name: Upload generated docs
        uses: actions/upload-artifact@v4
        with:
          name: generated-docs
          path: |
            site
            build/site
